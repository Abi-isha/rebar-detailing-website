<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="preload" href="style.css" as="style" onload="this.rel='stylesheet'">

    <header class="top-header">

        <div class="logo-box">
            <img src="image/logo2.PNG" alt="Raymar Logo" loading="lazy" decoding="async">
        </div>
        <div class="hamburger">
            <i class="fas fa-bars"></i>
        </div>
        <!-- NAV RIGHT -->
        <nav class="nav" id="navMenu">
            <a href="index.html#home" onclick="closeMenu()">Home</a>
            <a href="index.html#about" onclick="closeMenu()">About Us</a>

            <a href="index.html#contact" onclick="closeMenu()">Contact</a>

    <section class="projects">

        <h2>Residential Projects</h2>
    
        <!-- PROJECT BLOCK 1 -->
        <div class="project-block">
            <h3>BENJAMIN RESIDENCE</h3>
            <p class="project-location-text">
                <i class="fa-solid fa-location-dot"></i>Largo,FL, USA
            </p>
            <div class="slider">
                <img src="image2/Residential/BENJAMIN RESIDENCE_LARGO,FL/Capture.JPG" class="slide active" loading="lazy" decoding="async">

        </div>
    
        <!-- PROJECT BLOCK 2 -->
        <div class="project-block">
            <h3>DEL WEBB SUNCHASE CLUBHOUSE_RIVERVIEW</h3>
            <p class="project-location-text">
                <i class="fa-solid fa-location-dot"></i>Riverview,FL, USA
            </p>
            <div class="slider hover-slider">
                <img src="image2/Residential/DEL WEBB SUNCHASE CLUBHOUSE_RIVERVIEW,FL/Capture1.JPG" class="slide active" loading="lazy" decoding="async">
                <img src="image2/Residential/DEL WEBB SUNCHASE CLUBHOUSE_RIVERVIEW,FL/Capture2.JPG" class="slide" loading="lazy" decoding="async">

                <div class="dots">
                    <span class="dot active"></span>
                    <span class="dot"></span>
                </div>
            </div>
        </div>
    
        <!-- PROJECT BLOCK 3 -->
        <div class="project-block">
            <h3>ROJAS-NEVES RESIDENCE</h3>
            <p class="project-location-text">

                <div class="dots">
                    <span class="dot active"></span>
                    <span class="dot"></span>
                </div>
            </div>
        </div>
